<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1E293B">
  <title>{% block title %}TRMT3{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
{% block body %}
  {% block nav %}
  <header class="topnav">
    <div class="topnav-inner">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">T3</span>
        <span class="brand-text">
          <span class="brand-name">TRMT3</span>
          <span class="brand-sub">Tanker Management Team 3</span>
        </span>
      </a>

      <nav class="main-nav">
        <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint=='index' %}active{% endif %}">
          Daily 업무관리
        </a>
        <a href="{{ url_for('condition_survey') }}" class="nav-link {% if request.endpoint=='condition_survey' %}active{% endif %}">
          Condition Survey
        </a>
        <a href="{{ url_for('vetting_status') }}" class="nav-link {% if request.endpoint=='vetting_status' %}active{% endif %}">
          Vetting Status
        </a>
      </nav>

      <div class="user-menu">
        {% if session.role == 'admin' %}
        <button class="admin-trigger" id="btn-open-admin" title="감독/선박/사용자 관리">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span class="trig-label">관리</span>
        </button>
        {% endif %}
        <button class="user-menu-trigger" id="user-menu-trigger">
          <span class="user-name">{{ session.display_name or session.username }}</span>
          <span class="caret">▼</span>
        </button>
        <div class="user-dropdown" id="user-dropdown" hidden>
          <button type="button" class="dropdown-item" id="btn-change-password">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            비밀번호 변경
          </button>
          <div class="dropdown-sep"></div>
          <a class="dropdown-item danger" href="{{ url_for('logout') }}">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            로그아웃
          </a>
        </div>
      </div>
    </div>
  </header>
  {% endblock %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
